services:
  - type: web
    name: xiangtai-api
    runtime: node
    plan: free
    region: singapore
    rootDir: .
    buildCommand: npm install
    startCommand: npx tsx apps/api/src/main.ts
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: AUTH_SECRET
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: DEEPSEEK_API_BASE_URL
        value: https://api.deepseek.com/chat/completions

  - type: web
    name: xiangtai-web
    runtime: node
    plan: free
    region: singapore
    rootDir: .
    buildCommand: npm install && npm run build --prefix apps/web
    startCommand: cd apps/web && npx next start -H 0.0.0.0 -p $PORT
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
