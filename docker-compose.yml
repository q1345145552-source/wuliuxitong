# 本地或云服务器一键启动：前端 3000 + 后端 3001 + PostgreSQL 5432 + Redis 6379
# 使用：复制 env.example 为 .env 并填写后执行：docker compose up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: xiangtai-postgres
    ports:
      # 宿主机 5433 → 容器 5432，避开本机已有的 Postgres（5432）
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-xiangtai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xiangtai_dev}
      POSTGRES_DB: ${POSTGRES_DB:-xiangtai}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xiangtai} -d ${POSTGRES_DB:-xiangtai}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: xiangtai-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-xiangtai_redis_dev}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-xiangtai_redis_dev}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    user: root  # 容器以 root 运行，避免 /images 目录权限问题
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3001:3001"
    environment:
      AUTH_SECRET: ${AUTH_SECRET}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_API_BASE_URL: ${DEEPSEEK_API_BASE_URL:-https://api.deepseek.com/chat/completions}
      IMAGES_DIR: /images
      PORT: "3001"
      DATABASE_URL: postgresql://${POSTGRES_USER:-xiangtai}:${POSTGRES_PASSWORD:-xiangtai_dev}@postgres:5432/${POSTGRES_DB:-xiangtai}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-xiangtai_redis_dev}@redis:6379
    volumes:
      - ./data/images:/images
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001 -T 3 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 -T 3 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
